<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='carros.css'>
    <script src='main.js'></script>
</head>
<link rel="icon" type="image/png" href="img/Logo site alugaê.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100;1,100&display=swap" rel="stylesheet">

<body>
    <header>
        <div class="logo">
            <a href="../HomePage/index.html">
            <img src="./img/Logo site alugaê.png" alt="Alugaê">
            </a>
        </div>

        <div class="info_do_logo">
            <nav>
                <ul>
                    <li>
                        <a href="../HomePage/Contatos.html">Contatos</a>
                    </li>
                    <li>
                        <a>Minhas Reservas</a>
                    </li>
                    <li>
                        <a>Entrar</a>
                    </li>
                </ul>
            </nav>

        </div>
    </header>

    <div class="titulo">
        <h1>Nossos Carros</h1>
        <h2>Modelos - Anos - Cores</h2>
    </div>

    <div class="barra-pesquisa">

    <!-- FILTRO ANO -->
    <select id="filtro-ano" onchange="pesquisarCarros()">
        <option value="">Ano</option>
        <option value="2020">2020</option>
        <option value="2021">2021</option>
        <option value="2022">2022</option>
        <option value="2023">2023</option>
        <option value="2024">2024</option>
    </select>

    <!-- BUSCA -->
    <input 
        type="text" 
        id="input-busca"
        placeholder="🔎 Buscar por marca ou modelo..."
        onkeyup="pesquisarCarros()"
    >

    <!-- ORDENAR POR VALOR -->
    <select id="ordenacao" onchange="pesquisarCarros()">
        <option value="">Valor</option>
        <option value="menor">Menor preço</option>
        <option value="maior">Maior preço</option>
    </select>

    </div>

    <div id="lista-carros" class="carros-grid">
    <!-- Os carros serão inseridos aqui dinamicamente -->
</div>

<script src="nossos_carros.js"></script>

    <footer>
        <p>2025, Alugaê</p>
    </footer>
    
</body>
</html>
